<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Only One Answer ❤️</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
}

.container {
    background: rgba(255,255,255,0.2);
    padding: 40px;
    border-radius: 25px;
    text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    animation: pop 0.8s ease;
}

@keyframes pop {
    from { transform: scale(0.6); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

h1 {
    color: white;
    font-size: 2.5rem;
    margin-bottom: 10px;
}

p {
    color: white;
    font-size: 1.2rem;
    margin-bottom: 30px;
}

/* BUTTON AREA */
.buttons {
    position: relative;
    width: 320px;
    height: 160px;
    margin: auto;
}

/* COMMON BUTTON STYLE */
button {
    padding: 14px 30px;
    font-size: 1.1rem;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    transition: transform 0.3s ease;
}

/* YES BUTTON */
#yesBtn {
    background: #ff1e56;
    color: white;
    position: absolute;
    left: 20px;
    top: 50px;
}

/* NO BUTTON */
#noBtn {
    background: #444;
    color: white;
    position: absolute;
    left: 180px;
    top: 50px;
}

/* RESULT TEXT */
.result {
    margin-top: 25px;
    font-size: 1.5rem;
    color: white;
    display: none;
    animation: fadeIn 1s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* FLOATING HEARTS */
.heart {
    position: absolute;
    font-size: 20px;
    animation: float 5s linear infinite;
}

@keyframes float {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(-800px); opacity: 0; }
}
</style>
</head>

<body>

<div class="container">
    <h1>Do you love me? ❤️</h1>
    <p>Choose wisely 😌</p>

    <div class="buttons">
        <button id="yesBtn">YES 💖</button>
        <button id="noBtn">NO 💔</button>
    </div>

    <div class="result" id="result">
        🥰 I knew it! You’re my forever ❤️🌍
    </div>
</div>

<script>
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");
const box = document.querySelector(".buttons");
const result = document.getElementById("result");

let yesScale = 1;

// NO runs away + YES grows
noBtn.addEventListener("mouseenter", () => {
    const boxRect = box.getBoundingClientRect();
    const noRect = noBtn.getBoundingClientRect();

    const maxX = boxRect.width - noRect.width;
    const maxY = boxRect.height - noRect.height;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    // Grow YES button bit by bit
    yesScale += 0.12;
    yesBtn.style.transform = `scale(${yesScale})`;
});

// YES click
yesBtn.addEventListener("click", () => {
    result.style.display = "block";
    createHearts();
});

// Hearts animation
function createHearts() {
    setInterval(() => {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = Math.random() * 20 + 15 + "px";
        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 5000);
    }, 200);
}
</script>

</body>
</html>
